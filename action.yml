---
# Thycotic Secret Server integration gh action
name: 'Thycotic SS integration'
description: 'Secret management using Thycotic SS API'
inputs:
  url:
    description: The url of the secret server
    required: true
  username:
    description: Username for authenticating to the secret server
    required: true
  password:
    description: Password for authenticating to the secret server
    required: true
  getsecret1:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret2:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret3:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret4:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret5:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret6:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret7:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  getsecret8:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
outputs:
  secret1:
    description: Retrieved secret value
  secret2:
    description: Retrieved secret value
  secret3:
    description: Retrieved secret value
  secret4:
    description: Retrieved secret value
  secret5:
    description: Retrieved secret value
  secret6:
    description: Retrieved secret value
  secret7:
    description: Retrieved secret value
  secret8:
    description: Retrieved secret value
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.url }}
    - ${{ inputs.username }}
    - ${{ inputs.password }}
    - ${{ inputs.getsecret1 }}
    - ${{ inputs.getsecret2 }}
    - ${{ inputs.getsecret3 }}
    - ${{ inputs.getsecret4 }}
    - ${{ inputs.getsecret5 }}
    - ${{ inputs.getsecret6 }}
    - ${{ inputs.getsecret7 }}
    - ${{ inputs.getsecret8 }}
