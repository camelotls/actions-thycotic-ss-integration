---
# Thycotic Secret Server integration gh action
name: 'Thycotic SS integration'
description: 'Secret management using Thycotic SS API'
inputs:
  url:
    description: The url of the secret server
    required: true
  username:
    description: Username for authenticating to the secret server
    required: true
  password:
    description: Password for authenticating to the secret server
    required: true
  get_ss_field_1:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_2:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_3:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_4:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_5:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_6:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_7:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
  get_ss_field_8:
    description: "Secret in the format <SECRET_ID>/<SECRET_FIELD>"
    required: false
    default: ""
outputs:
  ss_field_1:
    description: Retrieved secret value
  ss_field_2:
    description: Retrieved secret value
  ss_field_3:
    description: Retrieved secret value
  ss_field_4:
    description: Retrieved secret value
  ss_field_5:
    description: Retrieved secret value
  ss_field_6:
    description: Retrieved secret value
  ss_field_7:
    description: Retrieved secret value
  ss_field_8:
    description: Retrieved secret value
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.url }}
    - ${{ inputs.username }}
    - ${{ inputs.password }}
    - ${{ inputs.get_ss_field_1 }}
    - ${{ inputs.get_ss_field_2 }}
    - ${{ inputs.get_ss_field_3 }}
    - ${{ inputs.get_ss_field_4 }}
    - ${{ inputs.get_ss_field_5 }}
    - ${{ inputs.get_ss_field_6 }}
    - ${{ inputs.get_ss_field_7 }}
    - ${{ inputs.get_ss_field_8 }}
